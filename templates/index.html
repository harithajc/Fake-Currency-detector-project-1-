<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Currency Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f9;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 800px;
        }
        input[type="file"] {
            margin: 20px 0;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔍 Fake Currency Detector</h1>
        <p>Upload an image of a currency note to verify its authenticity.</p>
        
        <form action="/" method="POST" enctype="multipart/form-data">
            <input type="file" name="currency_image" id="fileUpload" accept="image/*" required onchange="showPreview()">
            <br>
            <img id="imagePreview" src="" style="max-width: 100%; display: none; margin-top: 15px; border-radius: 8px; border: 2px solid #ccc;">
            <br><br>
            <button type="submit">Check Currency</button>
        </form>

        {% if final_result %}
            <div id="resultBox" style="margin-top: 25px; padding: 15px; border-radius: 5px; background-color: #e9ecef;">
                <h2>{{ final_result }}</h2>
                
                {% if show_image %}
                    <p style="color: #666; font-weight: bold;">Feature Matching Analysis:</p>
                    <img src="{{ url_for('static', filename='match_result.jpg') }}?v=1" style="max-width: 100%; border-radius: 8px; border: 2px solid #ccc;">
                {% endif %}
        
    </div>
  {% endif %}
        
</div>  

    <script>
        function showPreview() {
            var previewCanvas = document.getElementById('imagePreview');
            var uploadedFile = document.getElementById('fileUpload').files[0];
            
            previewCanvas.src = URL.createObjectURL(uploadedFile);
            previewCanvas.style.display = "block";
            //Hide the old result when they pick a new file!
            var oldResult = document.getElementById('resultBox');
            if (oldResult) {
                oldResult.style.display = "none";
            }
        }
    </script>

</body>
</html>
